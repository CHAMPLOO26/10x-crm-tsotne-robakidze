<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>

    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <main class="page">
      <section class="signup-card">
        <h1>Create your account</h1>

        <form id="signupForm">
          <div class="input-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Full Name" />
            <small class="error" id="fullNameError"></small>
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input type="text" id="email" placeholder="Email" />
            <small class="error" id="emailError"></small>
          </div>

          <div class="input-group">
            <label for="company">Company</label>
            <input type="text" id="company" placeholder="Company (optional)" />
            <small class="error" id="companyError"></small>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" />
            <small class="error" id="passwordError"></small>
          </div>

          <div class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm Password"
            />
            <small class="error" id="confirmPasswordError"></small>
          </div>

          <button type="submit">Create Account</button>
        </form>

        <p id="successMessage" class="success"></p>

        <p class="login-link">
          Already have an account?
          <a href="../index.html">Log in</a>
        </p>
      </section>
    </main>
    <script src="../js/guard.js" defer></script>
    <script src="../js/auth.js" defer></script>
  </body>
</html>
