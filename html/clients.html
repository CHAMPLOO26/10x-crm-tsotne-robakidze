<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10X CRM | Clients</title>

    <link rel="stylesheet" href="../css/clients.css" />
  </head>

  <body>
    <header class="site-header">
      <a class="brand" href="dashboard.html">
        <span class="brand-mark">10X</span>
        <span>CRM</span>
      </a>

      <nav class="main-nav">
        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="clients.html">Clients</a>
        <a href="profile.html">Profile</a>
      </nav>

      <button id="logoutButton" class="logout-button" type="button">
        Log out
      </button>
    </header>

    <main class="clients-page">
      <section class="page-heading">
        <div>
          <p class="eyebrow">CUSTOMER RELATIONSHIP MANAGEMENT</p>
          <h1>Clients</h1>
          <p class="page-description">
            Manage your clients and track every deal in one place.
          </p>
        </div>

        <button id="addClientButton" class="add-client-button" type="button">
          + Add Client
        </button>
      </section>

      <section class="toolbar">
        <div class="search-wrapper">
          <span class="search-icon">⌕</span>
          <input
            id="searchInput"
            type="text"
            placeholder="Search by name or company..."
          />
        </div>

        <div class="filter-chips" aria-label="Filter clients by status">
          <button class="filter-chip active" data-status="All" type="button">
            All
          </button>
          <button class="filter-chip" data-status="Lead" type="button">
            Lead
          </button>
          <button class="filter-chip" data-status="Contacted" type="button">
            Contacted
          </button>
          <button class="filter-chip" data-status="Won" type="button">
            Won
          </button>
          <button class="filter-chip" data-status="Lost" type="button">
            Lost
          </button>
        </div>

        <select id="sortSelect" class="sort-select">
          <option value="newest">Newest first</option>
          <option value="name">Name A-Z</option>
          <option value="dealValue">Deal value: high to low</option>
        </select>
      </section>

      <section id="clientsGrid" class="clients-grid">
        <p class="loading-text">Loading clients...</p>
      </section>
    </main>

    <div id="clientModal" class="modal hidden">
      <div class="modal-backdrop"></div>

      <section class="modal-card">
        <div class="modal-header">
          <div>
            <p class="eyebrow">NEW CLIENT</p>
            <h2>Add Client</h2>
          </div>

          <button id="closeModalButton" class="close-button" type="button">
            ×
          </button>
        </div>

        <form id="addClientForm" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="clientName">Name</label>
              <input id="clientName" type="text" placeholder="Client name" />
              <small id="clientNameError" class="error"></small>
            </div>

            <div class="form-group">
              <label for="clientEmail">Email</label>
              <input id="clientEmail" type="text" placeholder="Email address" />
              <small id="clientEmailError" class="error"></small>
            </div>

            <div class="form-group">
              <label for="clientPhone">Phone</label>
              <input
                id="clientPhone"
                type="text"
                placeholder="Phone (optional)"
              />
              <small id="clientPhoneError" class="error"></small>
            </div>

            <div class="form-group">
              <label for="clientCompany">Company</label>
              <input
                id="clientCompany"
                type="text"
                placeholder="Company (optional)"
              />
            </div>

            <div class="form-group">
              <label for="clientDealValue">Deal Value</label>
              <input id="clientDealValue" type="number" placeholder="5000" />
              <small id="clientDealValueError" class="error"></small>
            </div>

            <div class="form-group">
              <label for="clientStatus">Status</label>
              <select id="clientStatus">
                <option value="Lead">Lead</option>
                <option value="Contacted">Contacted</option>
                <option value="Won">Won</option>
                <option value="Lost">Lost</option>
              </select>
            </div>
          </div>

          <div class="modal-actions">
            <button id="cancelModalButton" class="cancel-button" type="button">
              Cancel
            </button>
            <button class="save-button" type="submit">Save Client</button>
          </div>
        </form>
      </section>
    </div>

    <p id="toast" class="toast hidden"></p>

    <script src="../js/guard.js" defer></script>
    <script src="../js/data.js" defer></script>
    <script src="../js/clients.js" defer></script>
  </body>
</html>
